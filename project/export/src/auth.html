<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Viking Tour · Sign in</title>
<link rel="stylesheet" href="shared.css"/>
<style>
  body { background: var(--paper); min-height:100vh; }
  .auth-shell { min-height:100vh; display:grid; grid-template-columns: 1fr 1.05fr; }
  @media (max-width: 900px) { .auth-shell { grid-template-columns: 1fr; } .auth-left { display:none; } }
  input:focus { outline: 2px solid var(--blue-500); outline-offset: 1px; border-color: var(--blue-500) !important; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="brand.jsx"></script>

<script type="text/babel">
function useHash(){
  const get=()=>(window.location.hash||'#login').replace(/^#/,'');
  const [v,setV]=React.useState(get());
  React.useEffect(()=>{ const f=()=>setV(get()); window.addEventListener('hashchange',f); return ()=>window.removeEventListener('hashchange',f); },[]);
  return [v, (to)=>{window.location.hash='#'+to;}];
}

function AuthShell({children, illustration}){
  return (
    <div className="auth-shell" data-screen-label="Auth · Sign in">
      <div className="auth-left" style={{
        position:'relative', overflow:'hidden',
        background:'linear-gradient(160deg, var(--navy-900) 0%, var(--navy-700) 55%, var(--blue-600) 100%)',
        color:'#fff', padding:'48px 56px', display:'flex', flexDirection:'column',
      }}>
        <div style={{position:'absolute', inset:0, opacity:.18, pointerEvents:'none', background:'radial-gradient(700px 400px at 80% 20%, #fff, transparent), radial-gradient(800px 400px at 20% 110%, #2674e5, transparent)'}}/>
        <div style={{position:'relative'}}>
          <Wordmark onDark/>
        </div>
        <div style={{position:'relative', marginTop:'auto'}}>
          {illustration}
          <p style={{fontFamily:'var(--f-display)', fontSize:42, lineHeight:1.1, marginTop:32, letterSpacing:'-0.01em'}}>
            "The archipelago, <span style={{fontStyle:'italic'}}>quietly</span> arranged for you."
          </p>
          <div style={{display:'flex', alignItems:'center', gap:14, marginTop:30}}>
            <span style={{width:38, height:38, borderRadius:99, background:'rgba(255,255,255,.14)', display:'grid', placeItems:'center', fontFamily:'var(--f-display)', fontStyle:'italic'}}>VK</span>
            <div>
              <div style={{fontSize:13.5, fontWeight:500}}>Viking Tour &amp; Travel</div>
              <div style={{fontSize:11.5, color:'rgba(255,255,255,.6)'}}>Kuala Lumpur · Est. 2019 · MOTAC licensed</div>
            </div>
          </div>
          <div style={{display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:18, marginTop:36, paddingTop:30, borderTop:'1px solid rgba(255,255,255,.12)'}}>
            {[
              {n:'14.2K', l:'travellers'},
              {n:'4.86', l:'avg. rating'},
              {n:'92',   l:'itineraries'},
            ].map((s,i)=>(
              <div key={i}>
                <div style={{fontFamily:'var(--f-display)', fontSize:28}}>{s.n}</div>
                <div style={{fontSize:10.5, color:'rgba(255,255,255,.55)', fontFamily:'var(--f-mono)', letterSpacing:'.1em', textTransform:'uppercase', marginTop:2}}>{s.l}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
      <div style={{padding:'48px 8vw 48px', display:'flex', flexDirection:'column', justifyContent:'center', background:'var(--paper)'}}>
        {children}
      </div>
    </div>
  );
}

function PassportIllustration(){
  return (
    <div style={{display:'flex', gap:14, alignItems:'flex-end'}}>
      <div className="ph ph-langkawi" data-label="LANGKAWI · KEDAH" style={{width:220, height:260, borderRadius:14, transform:'rotate(-4deg)'}}/>
      <div className="ph ph-kundasang" data-label="KUNDASANG · SABAH" style={{width:180, height:230, borderRadius:14, transform:'rotate(3deg) translateY(-12px)', border:'4px solid rgba(255,255,255,.16)'}}/>
    </div>
  );
}

function Field({label, type='text', value, onChange, placeholder, error, right}){
  return (
    <label style={{display:'block'}}>
      <div style={{fontFamily:'var(--f-mono)', fontSize:11, letterSpacing:'.14em', textTransform:'uppercase', color:'var(--ink-500)', marginBottom:7, display:'flex', justifyContent:'space-between'}}>
        <span>{label}</span>
        {right}
      </div>
      <input type={type} value={value} onChange={onChange} placeholder={placeholder}
        style={{
          width:'100%', padding:'14px 16px',
          background:'#fff', border:'1px solid ' + (error ? 'var(--coral)' : 'var(--line)'),
          borderRadius:12, fontSize:14.5, fontFamily:'inherit', color:'var(--ink-900)',
        }}/>
      {error && <div style={{fontSize:11.5, color:'var(--coral)', marginTop:6}}>{error}</div>}
    </label>
  );
}

function LoginPage(){
  const [, go] = useHash();
  const [email, setEmail] = React.useState('aisyah.r@gmail.com');
  const [pass, setPass]   = React.useState('•••••••••••');
  const [show, setShow]   = React.useState(false);
  const [err, setErr]     = React.useState('');
  return (
    <AuthShell illustration={<PassportIllustration/>}>
      <div style={{maxWidth:420, width:'100%', margin:'0 auto'}}>
        <div style={{fontFamily:'var(--f-mono)', fontSize:11, letterSpacing:'.18em', textTransform:'uppercase', color:'var(--ink-400)'}}>WELCOME BACK</div>
        <h1 style={{fontFamily:'var(--f-display)', fontSize:52, lineHeight:1.05, margin:'10px 0 14px', color:'var(--navy-900)', letterSpacing:'-0.02em'}}>
          Sign in to <br/><span style={{fontStyle:'italic', color:'var(--blue-600)'}}>your trips.</span>
        </h1>
        <p style={{color:'var(--ink-500)', fontSize:14.5, marginBottom:34}}>
          Pick up an unfinished booking, manage your itinerary, or download e-invoices. New here? <a href="#register" onClick={(e)=>{e.preventDefault(); go('register');}} style={{color:'var(--blue-600)', fontWeight:500}}>Create an account →</a>
        </p>

        <div style={{display:'flex', flexDirection:'column', gap:14}}>
          <Field label="EMAIL OR IC NUMBER" value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@gmail.com or 990408-14-5238"/>
          <Field label="PASSWORD" type={show?'text':'password'} value={pass} onChange={e=>setPass(e.target.value)}
            error={err}
            right={<a href="#forgot" onClick={(e)=>{e.preventDefault(); go('forgot');}} style={{color:'var(--blue-600)', textTransform:'none', letterSpacing:0, fontFamily:'inherit'}}>Forgot password?</a>}/>
          <label style={{display:'flex', alignItems:'center', gap:10, fontSize:13, color:'var(--ink-500)'}}>
            <input type="checkbox" defaultChecked style={{accentColor:'var(--blue-500)'}}/> Remember me for 30 days
            <span style={{marginLeft:'auto', fontSize:12}}>
              <label style={{display:'inline-flex', alignItems:'center', gap:6, cursor:'pointer'}}>
                <input type="checkbox" checked={show} onChange={e=>setShow(e.target.checked)} style={{accentColor:'var(--blue-500)'}}/>
                Show password
              </label>
            </span>
          </label>

          <button onClick={()=> setErr('')}
            style={{
              padding:'15px 24px', borderRadius:12,
              background:'var(--navy-800)', color:'#fff', border:0, cursor:'pointer',
              fontFamily:'inherit', fontSize:14.5, fontWeight:500,
              boxShadow:'0 6px 20px rgba(11,42,74,.2)', marginTop:8,
              display:'flex', alignItems:'center', justifyContent:'center', gap:8,
            }}>
            Sign in <Icon name="arrow-r" size={15}/>
          </button>

          <div style={{display:'grid', gridTemplateColumns:'1fr auto 1fr', gap:14, alignItems:'center', margin:'18px 0 4px'}}>
            <span style={{height:1, background:'var(--line)'}}/>
            <span style={{fontFamily:'var(--f-mono)', fontSize:10.5, letterSpacing:'.16em', color:'var(--ink-400)'}}>OR CONTINUE WITH</span>
            <span style={{height:1, background:'var(--line)'}}/>
          </div>

          <div style={{display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:8}}>
            {['Google','Apple','MyDigital ID'].map((p,i)=>(
              <button key={p} style={{
                padding:'12px 14px', borderRadius:11, border:'1px solid var(--line)',
                background:'#fff', cursor:'pointer', fontFamily:'inherit', fontSize:13, fontWeight:500, color:'var(--ink-700)',
                display:'flex', alignItems:'center', justifyContent:'center', gap:8,
              }}>
                <span style={{width:18, height:18, borderRadius:99, background:i===0?'#fff':i===1?'var(--navy-900)':'var(--coral)', border: i===0?'1px solid var(--line)':'none', color:i===0?'var(--navy-800)':'#fff', display:'grid', placeItems:'center', fontSize:10, fontWeight:700}}>{i===0?'G':i===1?'':'M'}</span>
                {p}
              </button>
            ))}
          </div>
        </div>

        <div style={{marginTop:34, fontSize:12, color:'var(--ink-400)', textAlign:'center'}}>
          Need help signing in? <a href="#" style={{color:'var(--blue-600)'}}>Contact support</a> · WhatsApp +60 12-345 6789
        </div>
      </div>
    </AuthShell>
  );
}

function RegisterPage(){
  const [, go] = useHash();
  const [step, setStep] = React.useState(1);
  return (
    <AuthShell illustration={<PassportIllustration/>}>
      <div style={{maxWidth:460, width:'100%', margin:'0 auto'}}>
        <div style={{fontFamily:'var(--f-mono)', fontSize:11, letterSpacing:'.18em', textTransform:'uppercase', color:'var(--ink-400)'}}>STEP {step} OF 2</div>
        <h1 style={{fontFamily:'var(--f-display)', fontSize:48, lineHeight:1.05, margin:'10px 0 14px', color:'var(--navy-900)', letterSpacing:'-0.02em'}}>
          {step===1 ? <>Join <span style={{fontStyle:'italic', color:'var(--blue-600)'}}>Viking Tour.</span></> : <>One last <span style={{fontStyle:'italic', color:'var(--blue-600)'}}>check.</span></>}
        </h1>
        <p style={{color:'var(--ink-500)', fontSize:14.5, marginBottom:30}}>
          {step===1 ? <>Already a member? <a href="#login" onClick={(e)=>{e.preventDefault(); go('login');}} style={{color:'var(--blue-600)', fontWeight:500}}>Sign in instead →</a></> : 'Verify the OTP we sent to your phone — usually arrives within 20 seconds.'}
        </p>

        {step===1 ? (
          <div style={{display:'flex', flexDirection:'column', gap:14}}>
            <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:14}}>
              <Field label="FIRST NAME" value="Nur Aisyah" onChange={()=>{}}/>
              <Field label="LAST NAME"  value="Rahman" onChange={()=>{}}/>
            </div>
            <Field label="IC NUMBER" value="990408-14-5238" onChange={()=>{}}/>
            <Field label="EMAIL"     value="aisyah.r@gmail.com" onChange={()=>{}}/>
            <Field label="PHONE"     value="+60 12-345 6789" onChange={()=>{}}/>
            <Field label="PASSWORD"  type="password" value="•••••••••••" onChange={()=>{}}
              right={<span style={{textTransform:'none', letterSpacing:0, color:'var(--jade)', fontFamily:'inherit'}}>Strong ✓</span>}/>
            <label style={{display:'flex', alignItems:'flex-start', gap:10, fontSize:12.5, color:'var(--ink-500)', marginTop:8, lineHeight:1.6}}>
              <input type="checkbox" defaultChecked style={{accentColor:'var(--blue-500)', marginTop:3}}/>
              I agree to the <a href="#" style={{color:'var(--blue-600)', fontWeight:500}}>Terms &amp; Conditions</a> and <a href="#" style={{color:'var(--blue-600)', fontWeight:500}}>Privacy Policy</a>, and consent to receive marketing emails (you can unsubscribe any time).
            </label>
            <button onClick={()=>setStep(2)} style={{
              padding:'15px 24px', borderRadius:12, background:'var(--navy-800)', color:'#fff', border:0, cursor:'pointer',
              fontFamily:'inherit', fontSize:14.5, fontWeight:500, boxShadow:'0 6px 20px rgba(11,42,74,.2)', marginTop:8,
              display:'flex', alignItems:'center', justifyContent:'center', gap:8,
            }}>
              Create account <Icon name="arrow-r" size={15}/>
            </button>
          </div>
        ) : (
          <div style={{display:'flex', flexDirection:'column', gap:18}}>
            <div style={{padding:'18px 18px', background:'var(--blue-50)', border:'1px solid var(--blue-100)', borderRadius:12, fontSize:13, color:'var(--navy-800)', display:'flex', gap:10}}>
              <Icon name="phone" size={16} color="var(--blue-600)"/>
              We sent a 6-digit code to <strong>+60 12-***-6789</strong>. <a href="#" style={{color:'var(--blue-600)', marginLeft:8}}>Wrong number?</a>
            </div>
            <div>
              <div style={{fontFamily:'var(--f-mono)', fontSize:11, letterSpacing:'.14em', color:'var(--ink-500)', marginBottom:10}}>OTP CODE</div>
              <div style={{display:'flex', gap:10}}>
                {['4','2','1','8','9','3'].map((d,i)=>(
                  <input key={i} defaultValue={d} maxLength={1} style={{
                    width:54, height:64, textAlign:'center',
                    fontFamily:'var(--f-display)', fontSize:30, color:'var(--navy-900)',
                    background:'#fff', border:'1px solid ' + (i===5?'var(--blue-500)':'var(--line)'), borderRadius:12,
                  }}/>
                ))}
              </div>
            </div>
            <div style={{fontSize:13, color:'var(--ink-500)'}}>Didn't receive the code? <a href="#" style={{color:'var(--blue-600)', fontWeight:500}}>Resend in 0:24</a></div>
            <div style={{display:'flex', gap:10, marginTop:8}}>
              <button onClick={()=>setStep(1)} style={{
                flex:'0 0 auto', padding:'14px 22px', borderRadius:12, background:'#fff', color:'var(--navy-800)', border:'1px solid var(--line)', cursor:'pointer',
                fontFamily:'inherit', fontSize:14, fontWeight:500,
              }}>← Back</button>
              <button style={{
                flex:1, padding:'14px 22px', borderRadius:12, background:'var(--navy-800)', color:'#fff', border:0, cursor:'pointer',
                fontFamily:'inherit', fontSize:14.5, fontWeight:500, boxShadow:'0 6px 20px rgba(11,42,74,.2)',
              }}>Verify &amp; finish</button>
            </div>
          </div>
        )}
      </div>
    </AuthShell>
  );
}

function ForgotPage(){
  const [, go] = useHash();
  return (
    <AuthShell illustration={<PassportIllustration/>}>
      <div style={{maxWidth:420, width:'100%', margin:'0 auto'}}>
        <div style={{fontFamily:'var(--f-mono)', fontSize:11, letterSpacing:'.18em', textTransform:'uppercase', color:'var(--ink-400)'}}>RECOVERY</div>
        <h1 style={{fontFamily:'var(--f-display)', fontSize:52, lineHeight:1.05, margin:'10px 0 14px', color:'var(--navy-900)', letterSpacing:'-0.02em'}}>
          Forgot your <br/><span style={{fontStyle:'italic', color:'var(--blue-600)'}}>password?</span>
        </h1>
        <p style={{color:'var(--ink-500)', fontSize:14.5, marginBottom:30}}>
          Enter the email tied to your account. We'll send a secure reset link valid for 30 minutes.
        </p>
        <div style={{display:'flex', flexDirection:'column', gap:14}}>
          <Field label="EMAIL ADDRESS" value="aisyah.r@gmail.com" onChange={()=>{}}/>
          <button style={{
            padding:'15px 24px', borderRadius:12, background:'var(--navy-800)', color:'#fff', border:0, cursor:'pointer',
            fontFamily:'inherit', fontSize:14.5, fontWeight:500, boxShadow:'0 6px 20px rgba(11,42,74,.2)', marginTop:8,
            display:'flex', alignItems:'center', justifyContent:'center', gap:8,
          }}>Send reset link <Icon name="arrow-r" size={15}/></button>
          <a href="#login" onClick={(e)=>{e.preventDefault(); go('login');}}
            style={{textAlign:'center', fontSize:13.5, color:'var(--blue-600)', fontWeight:500, marginTop:8}}>← Back to sign in</a>
        </div>
      </div>
    </AuthShell>
  );
}

function ProfilePage(){
  return (
    <AuthShell illustration={<PassportIllustration/>}>
      <div style={{maxWidth:520, width:'100%', margin:'0 auto'}}>
        <div style={{fontFamily:'var(--f-mono)', fontSize:11, letterSpacing:'.18em', textTransform:'uppercase', color:'var(--ink-400)'}}>ACCOUNT SETTINGS</div>
        <h1 style={{fontFamily:'var(--f-display)', fontSize:44, lineHeight:1.05, margin:'10px 0 22px', color:'var(--navy-900)', letterSpacing:'-0.02em'}}>
          Your profile.
        </h1>
        <div style={{display:'flex', alignItems:'center', gap:18, padding:'18px 20px', background:'#fff', border:'1px solid var(--line)', borderRadius:14, marginBottom:18}}>
          <div style={{width:60, height:60, borderRadius:99, background:'linear-gradient(135deg, var(--navy-700), var(--blue-500))', color:'#fff', display:'grid', placeItems:'center', fontFamily:'var(--f-display)', fontSize:24}}>NA</div>
          <div style={{flex:1}}>
            <div style={{fontWeight:600, fontSize:15}}>Nur Aisyah Rahman</div>
            <div style={{fontSize:12.5, color:'var(--ink-400)'}}>Member since Aug 2023 · 3 upcoming trips · 12 lifetime bookings</div>
          </div>
          <button style={{padding:'8px 14px', borderRadius:99, background:'#fff', border:'1px solid var(--line)', cursor:'pointer', fontFamily:'inherit', fontSize:12.5, fontWeight:500}}>Upload photo</button>
        </div>
        <div style={{display:'flex', flexDirection:'column', gap:14, padding:'24px 24px', background:'#fff', border:'1px solid var(--line)', borderRadius:14}}>
          <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:14}}>
            <Field label="FIRST NAME" value="Nur Aisyah" onChange={()=>{}}/>
            <Field label="LAST NAME" value="Rahman" onChange={()=>{}}/>
          </div>
          <Field label="EMAIL"  value="aisyah.r@gmail.com" onChange={()=>{}}/>
          <Field label="PHONE"  value="+60 12-345 6789" onChange={()=>{}}/>
          <Field label="IC NUMBER" value="990408-14-5238" onChange={()=>{}}/>
          <Field label="HOME ADDRESS" value="A-12-3, Residensi Tropika, Jalan Pjs 8/5, 46150 Petaling Jaya" onChange={()=>{}}/>
          <div style={{display:'flex', gap:10, marginTop:10}}>
            <button style={{padding:'12px 22px', borderRadius:12, background:'var(--navy-800)', color:'#fff', border:0, cursor:'pointer', fontFamily:'inherit', fontWeight:500, fontSize:13.5}}>Save changes</button>
            <button style={{padding:'12px 22px', borderRadius:12, background:'#fff', color:'var(--navy-800)', border:'1px solid var(--line)', cursor:'pointer', fontFamily:'inherit', fontWeight:500, fontSize:13.5}}>Cancel</button>
            <button style={{marginLeft:'auto', padding:'12px 16px', borderRadius:12, background:'transparent', color:'var(--coral)', border:0, cursor:'pointer', fontFamily:'inherit', fontWeight:500, fontSize:13.5, display:'flex', alignItems:'center', gap:8}}>
              <Icon name="logout" size={15}/> Log out
            </button>
          </div>
        </div>
      </div>
    </AuthShell>
  );
}

function App(){
  const [route] = useHash();
  if (route==='register') return <RegisterPage/>;
  if (route==='forgot')   return <ForgotPage/>;
  if (route==='profile')  return <ProfilePage/>;
  return <LoginPage/>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
