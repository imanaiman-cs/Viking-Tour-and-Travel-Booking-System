<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Viking Tour &amp; Travel — Design System</title>
<link rel="stylesheet" href="shared.css"/>
<style>
  html, body { height: 100%; overflow: hidden; background:#f0eee9; font-family: var(--f-sans); }
  iframe { border: 0; display: block; width: 100%; height: 100%; background: var(--paper); }
  .ab-frame { width: 100%; height: 100%; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="brand.jsx"></script>
<script type="text/babel" src="customer/shell.jsx"></script>
<script type="text/babel" src="brand-sheet.jsx"></script>

<script type="text/babel">
function Frame({src}){
  return <iframe className="ab-frame" src={src} loading="lazy" scrolling="yes"/>;
}

function App(){
  const W = 1440, H = 900;
  const WM = 420; // mobile width
  const HM = 880;
  return (
    <DesignCanvas>

      <DCSection id="brand" title="Brand & Design System" subtitle="Foundations — palette, type scale, components, iconography">
        <DCArtboard id="system" label="01 · Design System Sheet" width={1280} height={1900}>
          <BrandSheet/>
        </DCArtboard>
      </DCSection>

      <DCSection id="customer" title="Customer Site" subtitle="Public-facing — booking flow, packages, content pages">
        <DCArtboard id="home"          label="02 · Home"                width={W} height={H}><Frame src="customer.html#/"/></DCArtboard>
        <DCArtboard id="packages"      label="03 · Packages List"       width={W} height={H}><Frame src="customer.html#/packages"/></DCArtboard>
        <DCArtboard id="detail"        label="04 · Package Detail"      width={W} height={H}><Frame src="customer.html#/package/lk-001"/></DCArtboard>
        <DCArtboard id="reservation"   label="05 · Reservation Flow"    width={W} height={H}><Frame src="customer.html#/reservation/lk-001"/></DCArtboard>
        <DCArtboard id="myrsv"         label="06 · My Reservations"     width={W} height={H}><Frame src="customer.html#/reservations"/></DCArtboard>
        <DCArtboard id="promotions"    label="07 · Promotions"          width={W} height={H}><Frame src="customer.html#/promotions"/></DCArtboard>
        <DCArtboard id="about"         label="08 · About Us"            width={W} height={H}><Frame src="customer.html#/about"/></DCArtboard>
        <DCArtboard id="contact"       label="09 · Contact Us"          width={W} height={H}><Frame src="customer.html#/contact"/></DCArtboard>
      </DCSection>

      <DCSection id="admin" title="Admin Panel" subtitle="Internal operations — dashboard, bookings management, packages, notifications">
        <DCArtboard id="dashboard"     label="10 · Admin Dashboard"     width={W} height={H}><Frame src="admin.html#/dashboard"/></DCArtboard>
        <DCArtboard id="rsv-admin"     label="11 · Reservations Mgmt"   width={W} height={H}><Frame src="admin.html#/reservations"/></DCArtboard>
        <DCArtboard id="pkg-admin"     label="12 · Package Management"  width={W} height={H}><Frame src="admin.html#/packages"/></DCArtboard>
        <DCArtboard id="notif-admin"   label="13 · Notifications"       width={W} height={H}><Frame src="admin.html#/notifications"/></DCArtboard>
      </DCSection>

      <DCSection id="auth" title="Authentication" subtitle="Login, register, password recovery, profile settings">
        <DCArtboard id="login"         label="14 · Sign in"             width={W} height={H}><Frame src="auth.html#login"/></DCArtboard>
        <DCArtboard id="register"      label="15 · Create Account"      width={W} height={H}><Frame src="auth.html#register"/></DCArtboard>
        <DCArtboard id="forgot"        label="16 · Forgot Password"     width={W} height={H}><Frame src="auth.html#forgot"/></DCArtboard>
        <DCArtboard id="profile"       label="17 · Profile Settings"    width={W} height={H}><Frame src="auth.html#profile"/></DCArtboard>
      </DCSection>

      <DCSection id="mobile" title="Mobile Responsive Views" subtitle="Same pages, 420px viewport — header collapses to hamburger drawer">
        <DCArtboard id="m-home"        label="18 · Mobile · Home"       width={WM} height={HM}><Frame src="customer.html#/"/></DCArtboard>
        <DCArtboard id="m-packages"    label="19 · Mobile · Packages"   width={WM} height={HM}><Frame src="customer.html#/packages"/></DCArtboard>
        <DCArtboard id="m-detail"      label="20 · Mobile · Detail"     width={WM} height={HM}><Frame src="customer.html#/package/lk-001"/></DCArtboard>
        <DCArtboard id="m-rsv"         label="21 · Mobile · Reservation" width={WM} height={HM}><Frame src="customer.html#/reservation/lk-001"/></DCArtboard>
        <DCArtboard id="m-promo"       label="22 · Mobile · Promotions" width={WM} height={HM}><Frame src="customer.html#/promotions"/></DCArtboard>
        <DCArtboard id="m-login"       label="23 · Mobile · Sign in"    width={WM} height={HM}><Frame src="auth.html#login"/></DCArtboard>
      </DCSection>

      <DCPostIt top={140} left={60} rotate={-3}>
        <strong>Project:</strong> Viking Tour &amp; Travel — Malaysian booking platform.<br/><br/>
        Drag artboards to reorder · double-click labels to rename · click any artboard's expand icon for fullscreen focus mode.
      </DCPostIt>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
